# Project-local Helix overrides for THIS template.
# Helix merges this over your global ~/.config/helix/languages.toml, so it only
# needs the bits specific to this repo -- the latex language + servers are defined
# globally; here we just turn on texlab's build + forward/inverse search.
#
# Engine (LuaLaTeX), synctex, shell-escape and the aux dir all come from this
# repo's .latexmkrc, so we don't repeat them here.
#
# Battery note: onSave rebuilds on every save. On a laptop, set onSave = false and
# trigger builds manually instead.

# Let texlab resolve \usepackage{hwstyle}/{essaystyle} from styles/ (off the default
# search path), mirroring .latexmkrc. NOTE: this does NOT make texlab find the
# bibliography -- it won't follow \usepackage into a .sty, so \cite{} completion needs
# \addbibresource{references.bib} in the entry .tex itself (see essay.tex).
[language-server.texlab.environment]
TEXINPUTS = ".:styles:"
BIBINPUTS = ".:"

# auxDirectory is a TOP-LEVEL texlab key, not a child of `build`; nesting it under
# build makes texlab ignore it and assume aux/PDF sit at the repo root.
[language-server.texlab.config.texlab]
auxDirectory = "build"

# Completion matching. The default "fuzzy-ignore-case" does subsequence matching,
# so typing "shiu" matches keys like "gerstnerlabCNS21BiophysicsNeurons2023"
# (the letters s-h-i-u appear in order). "prefix-ignore-case" keeps only items
# that START with what you typed -- so "shiu" matches Zotero keys beginning
# "shiu..." (author-first keys), killing the false positives.
[language-server.texlab.config.texlab.completion]
matcher = "prefix-ignore-case"

# Render the actual symbol glyph (e.g. ∑, α) when hovering a command/symbol,
# instead of a textual description.
[language-server.texlab.config.texlab.hover]
symbols = "glyph"

[language-server.texlab.config.texlab.build]
executable = "latexmk"
# No -pdf (that forces pdfLaTeX) and no -outdir: .latexmkrc is the single source
# of truth -- it selects LuaLaTeX and sends ALL output (aux + pdf + synctex) to
# build/. The editor and `make` therefore build to the exact same place, so they
# never thrash latexmk's fdb cache. Point your viewer at build/<file>.pdf.
args = ["-interaction=nonstopmode", "%f"]
pdfDirectory = "build"
onSave = true
forwardSearchAfter = true

# Forward search into Skim (editor -> PDF). Runs after each on-save build because
# forwardSearchAfter = true. `-g` reloads/jumps in the background so Skim doesn't
# steal focus on every save. %p resolves to build/<file>.pdf via pdfDirectory.
# (On Linux, swap this for e.g. zathura: args = ["--synctex-forward", "%l:%f", "%p"].)
[language-server.texlab.config.texlab.forwardSearch]
executable = "/Applications/Skim.app/Contents/SharedSupport/displayline"
args = ["-g", "%l", "%p", "%f"]
