# Helix "typewriter"
#
# This is a *separate, deliberate* config you enter for focused drafting and
# leave by quitting Helix (:q). Helix has no runtime keymap toggle and `hx -c`
# does NOT merge with your normal config, so it is its own minimal setup.
#
# Launch it with:
#     hx -c .helix/typewriter.toml yourfile.tex
#   or:
#     make write FILE=essay
#
# It does two things:
#   1. Pins the cursor to the vertical center of the screen (typewriter scroll).
#   2. Disables deletion / undo so you are pushed to keep writing forward.
#
# Note: this is best-effort, not a hard lock — command mode (:) is still open.

theme = "default"

[editor]
scrolloff = 999          # cursor stays centered; the page scrolls under it
[editor.soft-wrap]
enable = true            # wrap long prose lines instead of scrolling sideways

# --- Insert mode: no deleting ---
[keys.insert]
"C-[" = "normal_mode"    # keep a familiar escape
backspace = "no_op"      # no delete-backward
del = "no_op"            # no delete-forward
C-w = "no_op"            # no delete-word-backward
C-u = "no_op"            # no kill-to-line-start

# --- Normal mode: no undo / structural deletes ---
[keys.normal]
u = "no_op"              # no undo
U = "no_op"              # no redo
d = "no_op"              # no delete-selection
c = "no_op"              # no change-selection
r = "no_op"              # no replace-char
R = "no_op"              # no replace-with-yanked
